<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/7b559ce379.js" crossorigin="anonymous"></script>
    <link rel="shortcut icon" href="favicon/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="estilos/style.css" media="all">

    <title>Barber Kings - O verdadeiro corte dos reis</title>
</head>
<body>
    <header>
        <div id="cabeçalho">
            <h1>Barber Kings></h1>
            <img id="icon" src="icon/horseman-moustache-typical-of-mexico.png" alt="bigode">
        </div>
        <nav>
            <ul>
                <li><a href="#">Início</a></li>
                <li><a href="#">Serviços</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#">Galeria</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
      </nav>
        
    </header>

    <main>
        <section id="hero-container">

            <div id="hero-titulo">          
                <h2>Barber Kings</h2>            
                <p>O verdadeiro corte dos reis</p>
            </div>
  
            <div id="hero-botao">
                <div class="buton">
                    <a href="#">Agendar Horário <select name="horários" id="hora">
                        <option value="8h">8h - 9h</option>
                        <option value="10h">10h - 11h</option>
                        <option value="12h">12h - 13h</option>
                        <option value="14h">14h - 15h</option>
                        <option value="16h">16h - 17h</option>

                    </select></a>
                </div>
            </div>
        </section>

        <section id="serv-container">
            <article class="servs1">
                <div class="serv-titulo">
                    <p>Corte</p>
                </div>
                <div class="serv-preco">
                    <p>R$ 30</p>
                </div>
                <div class="serv-descricao">
                    <p>Fazemos qualquer corte!</p>
                </div>
            </article>

            <article class="servs2">
                <div class="serv-titulo">
                    <p>Barba</p>
                </div>
                <div class="serv-preco">
                    <p>R$ 20</p>
                </div>
                <div class="serv-descricao">
                    <p>Deixamos do jeito que você quer!</p>
                </div>
            </article>

            <article class="servs3">
                <div class="serv-titulo">
                    <p>Combo - Cabelo e Barba</p>
                </div>
                <div class="serv-preco">
                    <p>R$ 45</p>
                </div>
                <div class="serv-descricao">
                    <p>Faça esse combo na promoção!</p>
                </div>
            </article>

          
        </section>

        <section id="sobre">
            <div id="sobre-texto">

            </div>

            <img src="#" alt="">
        </section>

        <section id="galeria">
            <article id="galeria-container">
                <div id="galeria-img-g">
                    <img src="" alt="">
                </div>

                <div id="galeria-pequena">
                    <div class="galeria-img-p">
                        <img src="#" alt="">
                    </div>
                    <div class="galeria-img-p">
                        <img src="#" alt="">
                    </div>
                </div>
            </article>
        </section>

        <section id="depoimentos">

        </section>

        <section id="contato">

        </section>
    </main>

    <footer>

    </footer>
</body>
</html>
